# site.title

title: Algo Alchemy 
description: My notes on quantitative finance, economics and data science-related thoughts.   
url: "https://csomers3.github.io"
host: 0.0.0.0


#########################
# more settings

markdown: kramdown

compress_html:
  clippings: all
  comments: [""]
  endings: [html, head, body, li, dt, dd, rt, rp, optgroup, option, colgroup, caption, thead, tbody, tfoot, tr, td, th]
  profile: false
  blanklines: false
  ignore:
    envs: []

sass:
  sass_dir: css
  style:    compressed

baseurl: ""
permalink: pretty
timezone: Europe/Dublin
future: false

exclude:
- README.md
- LICENSE.md
