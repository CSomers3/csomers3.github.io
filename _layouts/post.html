---
layout: compress
---

{% include head.html %}

<main>

    {% include header.html %}

    <article>
        <h1>{{ page.title }}</h1>
        <p class="subtitle">
            {{ page.date | date: "%b %-d, %Y" }}
            &emsp;
            <span style="display:inline; margin-left: 20px;">
                [{% capture category_name %}{{ page.category }}{% endcapture %}
                <a href="/category/{{ category_name }}">{{ category_name }}</a>
                ]
            </span>
        </p>

        {{ page.content }}

        <hr>

        <p><a href="{{ site.baseurl }}/articles">← Back to all articles</a></p>
    </article>

</main>

{% include footer-post.html %}
